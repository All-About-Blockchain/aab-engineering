<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aab.Engineering API</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --text-primary: #c9d1d9;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --border: #30363d;
    }
    
    body {
      margin: 0;
      padding: 0;
      background: var(--bg-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    .swagger-ui {
      background: var(--bg-primary);
    }
    
    .swagger-ui .info {
      margin: 20px 0;
    }
    
    .swagger-ui .info .title {
      font-size: 2rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .swagger-ui .info .description {
      color: var(--text-secondary);
    }
    
    .swagger-ui .topbar {
      display: none;
    }
    
    .swagger-ui .opblock {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 5px;
    }
    
    .swagger-ui .opblock:hover {
      border-color: var(--accent);
    }
    
    .swagger-ui .opblock-tag {
      color: var(--text-primary);
      font-weight: 600;
    }
    
    .swagger-ui .opblock-tag:hover {
      background: var(--bg-secondary);
    }
    
    .swagger-ui .endpoint-panel .get { border-left: 3px solid #58a6ff; }
    .swagger-ui .endpoint-panel .post { border-left: 3px solid #3fb950; }
    .swagger-ui .endpoint-panel .put { border-left: 3px solid #d29922; }
    .swagger-ui .endpoint-panel .delete { border-left: 3px solid #f85149; }
    
    .swagger-ui .btn {
      background: var(--accent);
      border-radius: 4px;
    }
    
    .swagger-ui .btn:hover {
      opacity: 0.9;
    }
    
    .swagger-ui .model-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
    }
    
    .swagger-ui .parameters-col_description input,
    .swagger-ui .parameters-col_description select {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }
    
    .swagger-ui .response-col_links {
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div id="api-docs"></div>
  
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js" charset="UTF-8"></script>
  <script>
    window.onload = function() {
      SwaggerUIBundle({
        url: '/docs/openapi.json',
        dom_id: '#api-docs',
        deepLinking: true,
        showExtensions: true,
        tryItOutEnabled: true,
        persistAuthorization: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIBundle.SwaggerUIStandalonePreset
        ],
        layout: 'StandaloneLayout'
      });
    };
  </script>
</body>
</html>
