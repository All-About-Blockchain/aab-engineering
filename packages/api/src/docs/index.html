<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aab.Engineering API</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #141414;
      --bg-tertiary: #1e1e1e;
      --text-primary: #f0f0f0;
      --text-secondary: #999999;
      --text-muted: #666666;
      --accent: #00d4aa;
      --accent-hover: #00f5c4;
      --border: #2a2a2a;
      --success: #00d4aa;
      --error: #ff4757;
      --get: #61affe;
      --post: #49cc90;
      --put: #fca130;
      --delete: #f93e3e;
    }
    
    * {
      box-sizing: border-box;
    }
    
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 280px;
      height: 100vh;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      padding: 1.5rem;
      overflow-y: auto;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), #00f5c4);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      color: #000;
    }
    
    .logo-text {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    
    .nav-section {
      margin-bottom: 1.5rem;
    }
    
    .nav-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }
    
    .nav-link {
      display: block;
      padding: 0.5rem 0.75rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      border-radius: 6px;
      transition: all 0.15s;
    }
    
    .nav-link:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    
    .nav-link.external {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .nav-link.external::after {
      content: "↗";
      font-size: 0.8rem;
      opacity: 0.5;
    }
    
    .main {
      margin-left: 280px;
      padding: 2rem;
      min-height: 100vh;
    }
    
    .api-docs {
      max-width: 1200px;
    }
    
    /* Swagger UI Overrides */
    .swagger-ui {
      background: transparent !important;
    }
    
    .swagger-ui .info {
      margin: 0 0 2rem 0 !important;
    }
    
    .swagger-ui .info .title {
      font-size: 2rem !important;
      font-weight: 700 !important;
      letter-spacing: -0.03em;
    }
    
    .swagger-ui .info .description {
      color: var(--text-secondary) !important;
      font-size: 1rem !important;
      line-height: 1.6;
    }
    
    .swagger-ui .topbar {
      display: none !important;
    }
    
    .swagger-ui .scheme-container {
      background: var(--bg-secondary) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      padding: 1rem !important;
      margin-bottom: 2rem !important;
    }
    
    .swagger-ui .opblock {
      background: var(--bg-secondary) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      margin-bottom: 0.75rem !important;
      overflow: hidden;
    }
    
    .swagger-ui .opblock:hover {
      border-color: var(--accent) !important;
    }
    
    .swagger-ui .opblock .opblock-summary {
      padding: 1rem !important;
      border-bottom: none !important;
    }
    
    .swagger-ui .opblock-tag {
      font-size: 1rem !important;
      font-weight: 600 !important;
      padding: 1rem !important;
      border-bottom: 1px solid var(--border) !important;
    }
    
    .swagger-ui .opblock-tag:hover {
      background: var(--bg-tertiary) !important;
    }
    
    .swagger-ui .endpoint-panel .get .opblock-summary { border-left: 3px solid var(--get); }
    .swagger-ui .endpoint-panel .post .opblock-summary { border-left: 3px solid var(--post); }
    .swagger-ui .endpoint-panel .put .opblock-summary { border-left: 3px solid var(--put); }
    .swagger-ui .endpoint-panel .delete .opblock-summary { border-left: 3px solid var(--delete); }
    
    .swagger-ui .opblock .opblock-section {
      background: var(--bg-tertiary) !important;
    }
    
    .swagger-ui .model-box {
      background: var(--bg-secondary) !important;
      border: 1px solid var(--border) !important;
    }
    
    .swagger-ui .parameters-col_description input,
    .swagger-ui .parameters-col_description select,
    .swagger-ui .parameters-col_description textarea {
      background: var(--bg-primary) !important;
      border: 1px solid var(--border) !important;
      color: var(--text-primary) !important;
      border-radius: 6px !important;
      padding: 0.5rem !important;
    }
    
    .swagger-ui .btn {
      background: var(--accent) !important;
      color: #000 !important;
      border-radius: 6px !important;
      font-weight: 600 !important;
    }
    
    .swagger-ui .btn:hover {
      background: var(--accent-hover) !important;
    }
    
    .swagger-ui .response-col_links {
      color: var(--text-secondary) !important;
    }
    
    .swagger-ui .curl-command {
      background: var(--bg-tertiary) !important;
      border-radius: 6px !important;
      padding: 1rem !important;
    }
    
    .swagger-ui .curl-command code {
      color: var(--accent) !important;
    }
    
    .swagger-ui input::placeholder {
      color: var(--text-muted) !important;
    }
    
    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 50vh;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <div class="logo-icon">∫</div>
      <div class="logo-text">Aab.Engineering</div>
    </div>
    
    <div class="nav-section">
      <div class="nav-title">Getting Started</div>
      <a href="#introduction" class="nav-link">Introduction</a>
      <a href="#authentication" class="nav-link">Authentication</a>
      <a href="#errors" class="nav-link">Errors</a>
    </div>
    
    <div class="nav-section">
      <div class="nav-title">Core</div>
      <a href="#health" class="nav-link">Health</a>
      <a href="#chains" class="nav-link">Chains</a>
      <a href="#rates" class="nav-link">Rates</a>
    </div>
    
    <div class="nav-section">
      <div class="nav-title">DeFi</div>
      <a href="#staking" class="nav-link">Staking</a>
      <a href="#swap" class="nav-link">Swap</a>
      <a href="#bridge" class="nav-link">Bridge</a>
    </div>
    
    <div class="nav-section">
      <div class="nav-title">Wallet</div>
      <a href="#wallet" class="nav-link">Wallet</a>
      <a href="#moonpay" class="nav-link">MoonPay</a>
    </div>
    
    <div class="nav-section">
      <div class="nav-title">Resources</div>
      <a href="https://github.com/All-About-Blockchain/aab-engineering" target="_blank" class="nav-link external">GitHub ↗</a>
      <a href="mailto:hello@aab.engineering" target="_blank" class="nav-link external">Contact ↗</a>
    </div>
  </div>
  
  <div class="main">
    <div class="api-docs">
      <div id="api-docs">
        <div class="loading">Loading API documentation...</div>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js" charset="UTF-8"></script>
  <script>
    window.onload = function() {
      SwaggerUIBundle({
        url: '/docs/openapi.json',
        dom_id: '#api-docs',
        deepLinking: true,
        showExtensions: true,
        showCommonExtensions: true,
        syntaxHighlight: {
          activate: true,
          theme: 'monokai'
        },
        tryItOutEnabled: true,
        persistAuthorization: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIBundle.SwaggerUIStandalonePreset
        ],
        layout: 'StandaloneLayout'
      });
    };
  </script>
</body>
</html>
